name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libusb-1.0-0-dev libudev-dev libxkbcommon-dev libwayland-dev libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev libgl1-mesa-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Check
        run: cargo check --all-targets

      - name: Test
        run: cargo test

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $system = "windows-$($env:RUNNER_ARCH.ToLower())"
          $archive = "aic-flash-$system.zip"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/aic-flash.exe "dist/aic-flash-$system.exe"
          Copy-Item target/release/aic-flash-gui.exe "dist/aic-flash-gui-$system.exe"
          Copy-Item README.md dist/
          Compress-Archive -Path dist/* -DestinationPath $archive -Force
          "PACKAGE_FILE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package Linux artifacts
        if: runner.os == 'Linux'
        run: |
          system="$(printf '%s-%s' "$RUNNER_OS" "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')"
          archive="aic-flash-${system}.tar.gz"
          mkdir -p dist
          cp target/release/aic-flash "dist/aic-flash-${system}"
          cp target/release/aic-flash-gui "dist/aic-flash-gui-${system}"
          cp README.md dist/
          tar -czf "$archive" -C dist .
          echo "PACKAGE_FILE=$archive" >> "$GITHUB_ENV"

      - name: Package macOS artifacts
        if: runner.os == 'macOS'
        run: |
          system="$(printf '%s-%s' "$RUNNER_OS" "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')"
          archive="aic-flash-${system}.tar.gz"
          mkdir -p dist
          cp target/release/aic-flash "dist/aic-flash-${system}"
          cp target/release/aic-flash-gui "dist/aic-flash-gui-${system}"
          cp README.md dist/
          tar -czf "$archive" -C dist .
          echo "PACKAGE_FILE=$archive" >> "$GITHUB_ENV"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_FILE }}
          path: ${{ env.PACKAGE_FILE }}
          if-no-files-found: error

  nightly:
    name: publish-nightly
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Move nightly tag to current commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = 'nightly';
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) throw error;
            }
            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });

      - name: Remove previous nightly assets
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: 'nightly',
              });
              for (const asset of release.data.assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
              }
            } catch (error) {
              if (error.status !== 404) throw error;
            }

      - name: Publish nightly release
        uses: actions/github-script@v7
        env:
          ASSET_DIR: release-assets
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = 'nightly';
            const body = [
              `Automated nightly build from \`${context.sha}\`.`,
              '',
              'Assets are named as `aic-flash-<system>` and include both CLI and GUI binaries.',
            ].join('\n');

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.data.id,
                name: 'aic-flash nightly',
                body,
                prerelease: true,
                make_latest: 'false',
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              release = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: context.sha,
                name: 'aic-flash nightly',
                body,
                prerelease: true,
                make_latest: 'false',
              });
            }

            const assetDir = process.env.ASSET_DIR;
            for (const file of fs.readdirSync(assetDir)) {
              const fullPath = path.join(assetDir, file);
              if (!fs.statSync(fullPath).isFile()) continue;
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.data.id,
                name: file,
                data: fs.readFileSync(fullPath),
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': fs.statSync(fullPath).size,
                },
              });
            }
