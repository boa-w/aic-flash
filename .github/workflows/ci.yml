name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libusb-1.0-0-dev libudev-dev libxkbcommon-dev libwayland-dev libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev libgl1-mesa-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Check
        run: cargo check --all-targets

      - name: Test
        run: cargo test

      - name: Build GUI
        run: cargo build --bin aic-flash-gui
